<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jammin CMS - Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #1e1e2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #a0a0a0;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #3a3a4e;
    }

    .section {
      margin-bottom: 32px;
    }

    /* Site Cards */
    .site-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .site-card {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 8px;
      padding: 16px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .site-info {
      flex: 1;
    }

    .site-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .site-url {
      font-size: 12px;
      color: #a0a0a0;
      font-family: monospace;
    }

    .site-path {
      font-size: 12px;
      color: #6366f1;
      font-family: monospace;
      margin-bottom: 12px;
    }

    .btn-edit {
      background: #3a3a4e;
      border: none;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-edit:hover {
      background: #4a4a5e;
    }

    /* Toggle Switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3a3a4e;
      transition: 0.2s;
      border-radius: 20px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: #6366f1;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      background: #4f46e5;
    }

    .btn-secondary {
      background: #3a3a4e;
    }

    .btn-secondary:hover {
      background: #4a4a5e;
    }

    .btn-danger {
      background: #ef4444;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .label-hint {
      font-weight: normal;
      color: #a0a0a0;
      font-size: 12px;
    }

    input[type="text"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      background: #1e1e2e;
      border: 1px solid #3a3a4e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #6366f1;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: monospace;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #3a3a4e;
    }

    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-top: 1px solid #3a3a4e;
    }

    .modal-footer-left {
      flex: 1;
    }

    .modal-footer-right {
      display: flex;
      gap: 8px;
    }

    /* Settings */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .setting-card {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 8px;
      padding: 16px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px;
      color: #a0a0a0;
    }

    .empty-state p {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jammin CMS</h1>
    <p class="subtitle">Inline website editing with Claude Code</p>

    <div class="section">
      <h2>Sites</h2>
      <div id="site-list" class="site-list"></div>
      <button id="add-site" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Site
      </button>
    </div>

    <div class="section">
      <h2>Settings</h2>
      <div class="settings-grid">
        <div class="setting-card">
          <div class="form-group">
            <label for="bridge-url">Bridge URL</label>
            <input type="url" id="bridge-url" placeholder="ws://localhost:9876">
          </div>
        </div>
        <div class="setting-card">
          <div class="form-group">
            <label for="claude-path">Claude CLI Path</label>
            <input type="text" id="claude-path" placeholder="/Users/you/.local/bin/claude">
          </div>
        </div>
        <div class="setting-card">
          <div class="form-group">
            <label for="default-editor">Default Editor</label>
            <select id="default-editor">
              <option value="auto">Auto-detect</option>
              <option value="cursor">Cursor</option>
              <option value="code">VS Code</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Site Modal -->
  <div id="site-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Site</h3>
      </div>
      <form id="site-form">
        <div class="modal-body">
          <div class="form-group">
            <label for="site-name-input">Name</label>
            <input type="text" id="site-name-input" placeholder="My Website" required>
          </div>
          <div class="form-group">
            <label for="site-pattern">
              URL Pattern
              <span class="label-hint">(use * as wildcard)</span>
            </label>
            <input type="text" id="site-pattern" placeholder="https://example.com/*" required>
          </div>
          <div class="form-group">
            <label for="site-title-pattern">
              Title Pattern
              <span class="label-hint">(optional — match by page title, e.g. *Jammin Games*)</span>
            </label>
            <input type="text" id="site-title-pattern" placeholder="*My App*">
          </div>
          <div class="form-group">
            <label for="site-path">Local Project Path</label>
            <input type="text" id="site-path" placeholder="/Users/you/Code/project" required>
          </div>
          <div class="form-group">
            <label for="site-instructions">
              Custom Instructions
              <span class="label-hint">(optional context for Claude)</span>
            </label>
            <textarea id="site-instructions" placeholder="This is a Next.js blog using MDX files in /posts..."></textarea>
          </div>
          <div class="form-group">
            <label for="site-selectors">
              Editable Selectors
              <span class="label-hint">(one per line)</span>
            </label>
            <textarea id="site-selectors" placeholder="main&#10;article&#10;[role='main']"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <div class="modal-footer-left">
            <button type="button" id="delete-site" class="btn btn-danger" style="display: none;">Delete</button>
          </div>
          <div class="modal-footer-right">
            <button type="button" id="cancel-modal" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
